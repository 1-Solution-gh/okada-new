<!DOCTYPE html>
<html lang="en" xml:lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

    const tileUrl = isDark
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';

    const attribution = isDark
      ? '&copy; OpenStreetMap & CartoDB'
      : '&copy; OpenStreetMap contributors';

    const map = L.map('map').setView([0, 0], 2);
    L.tileLayer(tileUrl, {
      attribution: attribution
    }).addTo(map);

    const marker = L.marker([0, 0], {
      icon: L.divIcon({
        html: '<div id="heading-icon" style="transform: rotate(0deg); width: 20px; height: 20px; background: red; border-radius: 50%;"></div>',
        iconSize: [20, 20],
        className: ''
      })
    }).addTo(map);

    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        const heading = pos.coords.heading ?? 0;

        const iconHtml = `<div style="transform: rotate(${heading}deg); width: 20px; height: 20px; background: red; border-radius: 50%;"></div>`;
        const rotatedIcon = L.divIcon({
          html: iconHtml,
          iconSize: [20, 20],
          className: ''
        });

        marker.setIcon(rotatedIcon);
        marker.setLatLng([lat, lon]);
        map.setView([lat, lon], 16);
      }, err => {
        alert("Location error: " + err.message);
      }, { enableHighAccuracy: true });
    } else {
      alert("Geolocation not supported.");
    }
  </script>
</body>
</html>
